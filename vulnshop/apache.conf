<VirtualHost *:80>
    DocumentRoot /app/public

    <Directory /app/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # VULNERABILITY: Server software version exposed in headers and error pages
    ServerSignature On
</VirtualHost>
